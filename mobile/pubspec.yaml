name: emergency_mobile
description: Aplicación móvil para clientes del sistema de asistencia de emergencia vehicular.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  geolocator: ^13.0.1
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  google_maps_flutter: ^2.9.0
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
